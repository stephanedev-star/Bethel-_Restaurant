<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bethel Cafe - Contact</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav id="navbar">
        <div>
            <h1>BETHEL CAFE</h1>
            <p>"A PLACE WHERE MEALS REFLECT CULTURE"</p>
        </div>
        <ul class="nav-links">
            <li><a href="home.html">Home</a></li>
            <li><a href="menu.html">Menu</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>

    <section id="contact">
        <h2>Contact Us</h2>
        <p>Phone: +237 671 775 874</p>

        <h3>Reserve a Table</h3>
        <form id="reservation-form">
            <input type="text" id="res-name" placeholder="Your Name">
            <input type="date" id="res-date">
            <input type="time" id="res-time">
            <input type="number" id="res-guests" placeholder="Number of Guests" min="1" max="20">
            <button type="button" id="res-btn">Reserve Now</button>
        </form>
        <p id="res-message"></p>
    </section>

    <footer>
        <p>© 2026 Bethel Cafe. All rights reserved.</p>

    </footer>
